<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Scroll Kirby-like Game</title>

  <!-- スマホ対応 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      text-align: center;
    }

    canvas {
      width: 100%;
      max-width: 800px;
      height: auto;
    }

    /* スマホボタン */
    #mobile-controls {
      position: fixed;
      bottom: 10px;
      width: 100%;
      display: flex;
      justify-content: space-around;
    }

    #mobile-controls button {
      width: 45%;
      height: 60px;
      font-size: 18px;
      opacity: 0.8;
    }

    button:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>

  <canvas id="game" width="800" height="400"></canvas>

  <!-- スマホ操作ボタン -->
  <div id="mobile-controls">
    <button id="jump-btn">⬆ ジャンプ</button>
    <button id="shoot-btn">🔫 攻撃</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
